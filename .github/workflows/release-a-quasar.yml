name: Release Test A — Quasar self-package

# Strategy A: trust `quasar build -m electron` to run its own packaging step,
# and archive whatever directory it produces (discovered by glob, not a
# hard-coded name). Linux-only for fast iteration.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test A (quasar self-package, linux-x64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Download tools
        run: node scripts/download-tools.js

      - name: Ensure tools directory exists
        run: mkdir -p resources/tools/linux-x64

      - name: Build (quasar handles packaging)
        run: npx quasar build -m electron

      - name: Inspect build output
        run: |
          echo "=== dist tree (depth 4) ==="
          find dist -maxdepth 4 -type d | sort || true

      - name: Archive discovered package
        shell: bash
        run: |
          shopt -s nullglob
          dirs=(dist/electron/Packaged/*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "ERROR: quasar produced no directory under dist/electron/Packaged"
            find dist -maxdepth 4 -type d | sort || true
            exit 1
          fi
          pkg="${dirs[0]%/}"
          name=$(basename "$pkg")
          echo "Archiving $pkg"
          tar -czf "$name.tar.gz" -C "dist/electron/Packaged" "$name"
          ls -la "$name.tar.gz"
          echo "ARTIFACT=$name.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testA-quasar-linux-x64
          path: ${{ env.ARTIFACT }}
