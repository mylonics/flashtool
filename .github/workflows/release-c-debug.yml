name: Release Test C — Packager (debug logs)

# Strategy C: same programmatic packaging as B, but with @electron/packager's
# internal debug logging enabled so the *real* reason for an empty result is
# printed. The helper script also try/catches and prints full stack traces.
# Use this run to diagnose if A, B and D all fail. Linux-only.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test C (packager debug, linux-x64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Download tools
        run: node scripts/download-tools.js

      - name: Ensure tools directory exists
        run: mkdir -p resources/tools/linux-x64

      - name: Build Electron app (UnPackaged)
        run: npx quasar build -m electron

      - name: Inspect UnPackaged
        run: |
          echo "=== UnPackaged contents ==="
          ls -la dist/electron/UnPackaged || true
          echo "=== UnPackaged package.json ==="
          cat dist/electron/UnPackaged/package.json || true

      - name: Package Electron app (debug)
        env:
          DEBUG: '@electron/packager,@electron/packager:*,electron-packager'
          DEBUG_COLORS: '0'
        run: node scripts/package-electron.js --platform linux --arch x64 --no-tmpdir

      - name: Verify and archive
        shell: bash
        run: |
          pkg="dist/electron/Packaged/flashtool-linux-x64"
          if [ ! -d "$pkg" ]; then
            echo "ERROR: no output at $pkg"
            find dist -maxdepth 4 -type d | sort || true
            exit 1
          fi
          tar -czf "flashtool-linux-x64.tar.gz" -C "dist/electron/Packaged" "flashtool-linux-x64"
          ls -la flashtool-linux-x64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testC-packager-debug-linux-x64
          path: flashtool-linux-x64.tar.gz
