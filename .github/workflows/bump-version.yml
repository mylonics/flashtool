name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version component to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # PAT_GITHUB is an org-level secret — allows pushing tags that
          # trigger release.yml (the default GITHUB_TOKEN cannot do this).
          token: ${{ secrets.PAT_GITHUB || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump ${{ inputs.bump }} version
        id: version
        run: |
          OLD=$(node -p "require('./package.json').version")
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW"  >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "chore: bump version ${{ steps.version.outputs.old }} → ${{ steps.version.outputs.new }}"
          git tag ${{ steps.version.outputs.tag }}
          git push origin HEAD
          git push origin ${{ steps.version.outputs.tag }}

      # Explicitly dispatch release.yml rather than relying on the tag push
      # to chain workflows — GitHub blocks cross-workflow triggers in many
      # configurations even when a PAT is used for the push.
      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          gh workflow run release.yml \
            --repo ${{ github.repository }} \
            --field tag=${{ steps.version.outputs.tag }}

      - name: Summary
        run: |
          echo "### Version bumped :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.version.outputs.old }}** → **${{ steps.version.outputs.new }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag \`${{ steps.version.outputs.tag }}\` created — release workflow dispatched." >> "$GITHUB_STEP_SUMMARY"
