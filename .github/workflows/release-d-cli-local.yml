name: Release Test D — Node 24 + upgraded packager

# Strategy D: stay on Node 24 but upgrade @electron/packager to the latest
# release first — in case a newer version fixes the post-extraction stall on
# Node 24. Then package via the programmatic API. Linux-only.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test D (node24, @electron/packager@latest, linux-x64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Upgrade @electron/packager to latest
        run: |
          npm install --save-dev @electron/packager@latest
          node -p "'@electron/packager ' + require('@electron/packager/package.json').version"

      - name: Download tools
        run: node scripts/download-tools.js

      - name: Ensure tools directory exists
        run: mkdir -p resources/tools/linux-x64

      - name: Build Electron app (UnPackaged)
        run: npx quasar build -m electron

      - name: Package Electron app
        env:
          DEBUG: '@electron/packager,@electron/packager:*'
          DEBUG_COLORS: '0'
        run: node scripts/package-electron.js --platform linux --arch x64 --no-tmpdir

      - name: Verify and archive
        shell: bash
        run: |
          pkg="dist/electron/Packaged/flashtool-linux-x64"
          if [ ! -d "$pkg" ]; then
            echo "ERROR: no output at $pkg"
            find dist -maxdepth 4 -type d | sort || true
            exit 1
          fi
          tar -czf "flashtool-linux-x64.tar.gz" -C "dist/electron/Packaged" "flashtool-linux-x64"
          ls -la flashtool-linux-x64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testD-node24-upgraded-linux-x64
          path: flashtool-linux-x64.tar.gz
