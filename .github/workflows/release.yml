name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v0.1.1)'
        required: true

# Allow creating releases and uploading artifacts
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            archive_ext: zip
          - os: ubuntu-latest
            platform: linux-x64
            archive_ext: tar.gz
          - os: macos-13
            platform: darwin-x64
            archive_ext: tar.gz
          - os: macos-latest   # macos-14+ = Apple Silicon
            platform: darwin-arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      # Resolve the tag we're building — from the pushed tag or the manual input.
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Linux needs libusb for serialport native addon
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install npm dependencies
        run: npm ci

      # Download and extract the bundled tools into resources/tools/<platform>/
      # Defaults to current runner platform — no --platform flag needed.
      - name: Download tools for ${{ matrix.platform }}
        run: node scripts/download-tools.js

      # Ensure the directory always exists so @electron/packager doesn't error
      # even if a particular tool has no prebuilt for this platform.
      - name: Ensure tools directory exists
        shell: bash
        run: |
          mkdir -p "resources/tools/${{ matrix.platform }}"
          echo "Tools directory contents:"
          ls -la "resources/tools/${{ matrix.platform }}" || true

      - name: Build Electron app
        run: npx quasar build -m electron

      # quasar build exits before @electron/packager finishes, so run it explicitly.
      # Use shell: bash on all platforms so a non-zero exit code always fails the step.
      - name: Package Electron app
        shell: bash
        run: npx electron-packager dist/electron/UnPackaged --out dist/electron/Packaged --overwrite --extra-resource resources/tools --name flashtool

      # ── Archive the packager output ─────────────────────────────────────────
      # @electron/packager emits a single directory under dist/electron/Packaged/
      # named "<name>-<platform>-<arch>/" (e.g. "flashtool-win32-x64/").

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/electron/Packaged")) { Write-Error "Packaged directory not found"; exit 1 }
          $pkg = Get-ChildItem "dist/electron/Packaged" -Directory | Select-Object -First 1
          if (-not $pkg) { Write-Error "No packager output found"; exit 1 }
          Compress-Archive -Path $pkg.FullName -DestinationPath "flashtool-${{ matrix.platform }}.zip"
          Write-Output "Created flashtool-${{ matrix.platform }}.zip ($('{0:N1}' -f ((Get-Item 'flashtool-${{ matrix.platform }}.zip').Length / 1MB)) MB)"

      - name: Create tar archive (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          pkg=$(find "dist/electron/Packaged" -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
          if [ -z "$pkg" ]; then echo "No packager output found"; exit 1; fi
          tar -czf "flashtool-${{ matrix.platform }}.tar.gz" -C "dist/electron/Packaged" "$(basename "$pkg")"
          size=$(du -sh "flashtool-${{ matrix.platform }}.tar.gz" | cut -f1)
          echo "Created flashtool-${{ matrix.platform }}.tar.gz ($size)"

      # ── Upload to GitHub Release ────────────────────────────────────────────
      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB }}
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: flashtool-${{ matrix.platform }}.${{ matrix.archive_ext }}
          generate_release_notes: true
