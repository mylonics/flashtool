name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v0.1.1)'
        required: true

# Allow creating releases and uploading artifacts
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            electron_platform: win32
            electron_arch: x64
            archive_ext: zip
          - os: ubuntu-latest
            platform: linux-x64
            electron_platform: linux
            electron_arch: x64
            archive_ext: tar.gz
          - os: macos-13
            platform: darwin-x64
            electron_platform: darwin
            electron_arch: x64
            archive_ext: tar.gz
          - os: macos-latest   # macos-14+ = Apple Silicon
            platform: darwin-arm64
            electron_platform: darwin
            electron_arch: arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      # Resolve the tag we're building — from the pushed tag or the manual input.
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Linux needs libusb for serialport native addon
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install npm dependencies
        run: npm ci

      # Download and extract the bundled tools into resources/tools/<platform>/
      # Defaults to current runner platform — no --platform flag needed.
      - name: Download tools for ${{ matrix.platform }}
        run: node scripts/download-tools.js

      # Ensure the directory always exists so @electron/packager doesn't error
      # even if a particular tool has no prebuilt for this platform.
      - name: Ensure tools directory exists
        shell: bash
        run: |
          mkdir -p "resources/tools/${{ matrix.platform }}"
          echo "Tools directory contents:"
          ls -la "resources/tools/${{ matrix.platform }}" || true

      - name: Build Electron app
        run: npx quasar build -m electron

      # Run @electron/packager via the CLI (installed as a devDependency) and
      # verify that output was actually produced — the packager exits 0 even on
      # failure unless the output directory is checked explicitly.
      - name: Package Electron app
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('./node_modules/electron/package.json').version")
          echo "Packaging flashtool for ${{ matrix.electron_platform }}-${{ matrix.electron_arch }} (electron v${ELECTRON_VER})"
          npx electron-packager dist/electron/UnPackaged flashtool \
            --platform "${{ matrix.electron_platform }}" \
            --arch "${{ matrix.electron_arch }}" \
            --out dist/electron/Packaged \
            --overwrite \
            --electron-version "$ELECTRON_VER" \
            --extra-resource resources/tools
          expected="dist/electron/Packaged/flashtool-${{ matrix.electron_platform }}-${{ matrix.electron_arch }}"
          if [ ! -d "$expected" ]; then
            echo "ERROR: packager produced no output at $expected"
            echo "Contents of dist/electron/Packaged:"
            ls -la dist/electron/Packaged/ || echo "(directory missing)"
            exit 1
          fi
          echo "Packaged output:"
          ls -la dist/electron/Packaged/

      # ── Archive the packager output ─────────────────────────────────────────
      # @electron/packager emits a single directory under dist/electron/Packaged/
      # named "<name>-<platform>-<arch>/" (e.g. "flashtool-win32-x64/").

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "dist/electron/Packaged/flashtool-${{ matrix.platform }}"
          if (-not (Test-Path $pkg)) { Write-Error "No packager output found at $pkg"; exit 1 }
          Compress-Archive -Path $pkg -DestinationPath "flashtool-${{ matrix.platform }}.zip"
          Write-Output "Created flashtool-${{ matrix.platform }}.zip ($('{0:N1}' -f ((Get-Item 'flashtool-${{ matrix.platform }}.zip').Length / 1MB)) MB)"

      - name: Create tar archive (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          pkg_dir="dist/electron/Packaged/flashtool-${{ matrix.platform }}"
          if [ ! -d "$pkg_dir" ]; then
            echo "No packager output found at $pkg_dir"
            echo "Contents of dist/electron/Packaged:"
            ls -la "dist/electron/Packaged/" || true
            exit 1
          fi
          tar -czf "flashtool-${{ matrix.platform }}.tar.gz" -C "dist/electron/Packaged" "flashtool-${{ matrix.platform }}"
          size=$(du -sh "flashtool-${{ matrix.platform }}.tar.gz" | cut -f1)
          echo "Created flashtool-${{ matrix.platform }}.tar.gz ($size)"

      # ── Upload to GitHub Release ────────────────────────────────────────────
      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB }}
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: flashtool-${{ matrix.platform }}.${{ matrix.archive_ext }}
          generate_release_notes: true
